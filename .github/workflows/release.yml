name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.91.0

      - name: Check tag matches Cargo.toml version
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f Cargo.toml ]]; then
            echo "::error::Cargo.toml not found in repository root"
            echo "Current directory:"
            pwd
            echo "Files:"
            ls -la
            echo "Cargo.toml candidates:"
            find . -maxdepth 4 -name Cargo.toml -print
            exit 1
          fi

          tag_version="${GITHUB_REF_NAME#v}"

          cargo_version="$(
            cargo metadata --no-deps --format-version 1 \
              | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])'
          )"

          if [[ "${tag_version}" != "${cargo_version}" ]]; then
            echo "::error::Tag version ${tag_version} does not match Cargo.toml version ${cargo_version}"
            exit 1
          fi

          echo "Tag version matches Cargo.toml version: ${cargo_version}"

      - name: Run tests
        run: cargo test --all-targets --all-features --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          asset_name="execenv-v${version}.linux.amd64"

          mkdir -p dist

          cp target/release/execenv "dist/${asset_name}"
          chmod +x "dist/${asset_name}"

          (
            cd dist
            sha256sum "${asset_name}" > "execenv-v${version}.checksums.txt"
          )

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          gh release create "${GITHUB_REF_NAME}" \
            dist/* \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag